<!doctype html>
<html lang="es-MX">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="css/utileria.css" />
        <!-- CSS sweet alert -->
        <link
            href=" https://cdn.jsdelivr.net/npm/sweetalert2@11.26.25/dist/sweetalert2.min.css "
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        />
    </head>
    <body>
        <!--Contenedor del login -->
        <div class="contenedor">
            <form action="" name="loginForm">
                <h1>Iniciar sesión</h1>
                <!-- Nombre del usuario -->
                <div class="input-box">
                    <input
                        type="text"
                        name="fnombre"
                        placeholder="Usuario"
                        required
                    />
                    <i class="icono fa-solid fa-user"></i>
                </div>

                <!--Mensaje de error del nombre -->
                <p id="errorName" class="errorName"></p>

                <!-- Si el correp esta vacio, esta funcion alerta con un mensaje y retorna falso-->
                <!-- Email -->
                <div class="input-box">
                    <input
                        type="email"
                        name="femail"
                        placeholder="Correo Electronico"
                        required
                    /><i class="icono fa-solid fa-at"></i>
                </div>

                <!--Mensaje de error del email-->
                <p id="errorEmail" class="errorEmail"></p>

                <!-- Password -->
                <div class="input-box">
                    <input
                        type="password"
                        id="password"
                        name="fpassword"
                        placeholder="Contraseña"
                        required
                    /><i class="icono fa-solid fa-lock"></i>
                </div>

                <!--Mensaje de error de password -->
                <p id="errorPass" class="errorPass"></p>

                <!--Recuerdame -->
                <div class="recuerdame">
                    <label
                        ><input class="check" type="checkbox" />
                        Recuerdame</label
                    ><a href="#">Olvidaste tu contraseña?</a>
                </div>

                <!-- Boton para ingresar al sitio (solo valida) -->
                <button type="button" class="btn" onclick="Calc()">
                    Ingresa
                </button>

                <div class="registrate-link">
                    <p id="pregunta">
                        No tienes una cuenta? <a href="#">Registrate</a>
                    </p>
                </div>
            </form>
        </div>

        <!-- SweetAlert -->
        <script src=" https://cdn.jsdelivr.net/npm/sweetalert2@11.26.25/dist/sweetalert2.all.min.js "></script>

        <!-- Iconos para el login -->

        <script src="js/utileria.js"></script>
    </body>
</html>
